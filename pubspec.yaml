name: keychain_ble
description: "Keychain BLE Demo App — ESP32 connectivity tester"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

# ————————————————— Dependencies —————————————————
dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  go_router: ^17.1.0

  # BLE
  flutter_blue_plus: ^1.35.3
  permission_handler: ^12.0.0+1

  # Persistence
  shared_preferences: ^2.5.4

  # Utilities
  intl: ^0.20.2
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  cupertino_icons: ^1.0.8

  # Code generation annotations
  freezed_annotation: ^3.1.0

  # SVG rendering
  flutter_svg: ^2.0.10+1

# ————————————————— Dev Dependencies —————————————————
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5

# ————————————————— Flutter —————————————————
flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/light/
    - assets/images/dark/
    - assets/icons/light/
    - assets/icons/dark/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-Bold.ttf
    - family: Punto
      fonts:
        - asset: assets/fonts/punto-bold.otf
        - asset: assets/fonts/punto.otf
